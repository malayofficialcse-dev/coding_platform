apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-campus-backend
  labels:
    app: code-campus-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-campus-backend
  template:
    metadata:
      labels:
        app: code-campus-backend
    spec:
      containers:
        - name: backend
          image: your-registry/code-campus-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: code-campus-backend
spec:
  selector:
    app: code-campus-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-campus-frontend
  labels:
    app: code-campus-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-campus-frontend
  template:
    metadata:
      labels:
        app: code-campus-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/code-campus-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: code-campus-frontend
spec:
  selector:
    app: code-campus-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-campus-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: code-campus.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: code-campus-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: code-campus-frontend
                port:
                  number: 80
